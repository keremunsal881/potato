<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Karakter Arşivi</title>
    <style>
        :root {
            --brawl-yellow: #FFCC00;
            --brawl-blue: #0066FF;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            text-align: center;
        }

        header {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            padding: 30px;
            color: #000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .search-container {
            margin: 20px;
        }

        input {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .brawler-card {
            background: var(--card-bg);
            border: 3px solid #333;
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .brawler-card:hover {
            transform: translateY(-10px);
            border-color: var(--brawl-yellow);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .brawler-card img {
            width: 100%;
            border-radius: 10px;
            background: #2a2a2a;
        }

        .brawler-name {
            margin-top: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        footer {
            padding: 20px;
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<header>
    <h1>BRAWL STARS REHBERİ</h1>
    <p>Tüm Karakterler Tek Bir Yerde!</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Karakter ara... (Örn: Leon)" onkeyup="filterBrawlers()">
</div>

<div class="container" id="brawlerContainer">
    <p>Karakterler yükleniyor...</p>
</div>

<footer>
    Bu site bir hayran çalışmasıdır. Brawl Stars, Supercell'in ticari markasıdır.
</footer>

<script>
    // Karakter verilerini çeken fonksiyon
    async function fetchBrawlers() {
        try {
            // BrawlAPI üzerinden güncel verileri çekiyoruz
            const response = await fetch('https://api.brawlapi.com/v1/brawlers');
            const data = await response.json();
            const container = document.getElementById('brawlerContainer');
            container.innerHTML = '';

            data.list.forEach(brawler => {
                const card = document.createElement('div');
                card.className = 'brawler-card';
                card.innerHTML = `
                    <img src="${brawler.imageUrl}" alt="${brawler.name}">
                    <div class="brawler-name">${brawler.name}</div>
                    <div style="color: ${brawler.rarity.color}; font-size: 0.8em;">${brawler.rarity.name}</div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Hata:", error);
            document.getElementById('brawlerContainer').innerHTML = "Karakterler yüklenirken bir hata oluştu.";
        }
    }

    // Arama fonksiyonu
    function filterBrawlers() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('brawler-card');

        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].querySelector('.brawler-name').innerText.toLowerCase();
            if (name.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // Sayfa açıldığında karakterleri getir
    fetchBrawlers();
</script>

</body>
</html>
